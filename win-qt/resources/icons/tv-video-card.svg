<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Monitor frame -->
  <rect x="6" y="8" width="52" height="36" rx="4" stroke="#00d4aa" stroke-width="3" fill="rgba(0,212,170,0.08)"/>
  <!-- Screen bezel highlight -->
  <rect x="10" y="12" width="44" height="28" rx="2" stroke="#00d4aa" stroke-width="1" opacity="0.3" fill="none"/>
  <!-- Play triangle -->
  <polygon points="26,18 26,36 42,27" fill="#00d4aa" opacity="0.9"/>
  <!-- Stand -->
  <line x1="32" y1="44" x2="32" y2="52" stroke="#00d4aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="20" y1="52" x2="44" y2="52" stroke="#00d4aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Camera indicator dot -->
  <circle cx="32" cy="10" r="1.5" fill="#00d4aa" opacity="0.5"/>
</svg>
