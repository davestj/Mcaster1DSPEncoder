<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Monitor frame -->
    <rect x="6" y="8" width="52" height="36" rx="4" stroke="#22ffcc" stroke-width="3" fill="rgba(34,255,204,0.12)"/>
    <!-- Screen bezel highlight -->
    <rect x="10" y="12" width="44" height="28" rx="2" stroke="#22ffcc" stroke-width="1" opacity="0.4" fill="none"/>
    <!-- Play triangle -->
    <polygon points="26,18 26,36 42,27" fill="#22ffcc" opacity="0.95"/>
    <!-- Stand -->
    <line x1="32" y1="44" x2="32" y2="52" stroke="#22ffcc" stroke-width="3" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="20" y1="52" x2="44" y2="52" stroke="#22ffcc" stroke-width="3" stroke-linecap="round"/>
    <!-- Camera indicator dot (recording) -->
    <circle cx="32" cy="10" r="2" fill="#ff4444" opacity="0.8"/>
  </g>
</svg>
