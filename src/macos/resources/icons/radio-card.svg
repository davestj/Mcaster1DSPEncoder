<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Radio tower base -->
  <line x1="32" y1="56" x2="32" y2="22" stroke="#00d4aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Left support leg -->
  <line x1="32" y1="56" x2="20" y2="56" stroke="#00d4aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Right support leg -->
  <line x1="32" y1="56" x2="44" y2="56" stroke="#00d4aa" stroke-width="3" stroke-linecap="round"/>
  <!-- Left diagonal brace -->
  <line x1="32" y1="40" x2="22" y2="56" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <!-- Right diagonal brace -->
  <line x1="32" y1="40" x2="42" y2="56" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <!-- Antenna tip -->
  <circle cx="32" cy="18" r="3" fill="#00d4aa"/>
  <!-- Broadcast waves left -->
  <path d="M22 14 A14 14 0 0 0 22 30" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M16 10 A20 20 0 0 0 16 34" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Broadcast waves right -->
  <path d="M42 14 A14 14 0 0 1 42 30" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M48 10 A20 20 0 0 1 48 34" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
