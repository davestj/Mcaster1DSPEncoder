<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Broadcast waves -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.6">
    <path d="M 48 64 Q 48 44 64 44 Q 80 44 80 64" stroke-linecap="round"/>
    <path d="M 38 64 Q 38 34 64 34 Q 90 34 90 64" stroke-linecap="round"/>
    <path d="M 28 64 Q 28 24 64 24 Q 100 24 100 64" stroke-linecap="round"/>
  </g>
  <!-- Microphone body -->
  <rect x="56" y="52" width="16" height="28" rx="8" fill="url(#accent)"/>
  <!-- Microphone stand -->
  <line x1="64" y1="80" x2="64" y2="96" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="96" x2="76" y2="96" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <!-- M1 text -->
  <text x="64" y="118" text-anchor="middle" fill="#00d4aa" font-family="Helvetica Neue,sans-serif" font-weight="700" font-size="14">M1</text>
</svg>
